<!-- note_form.html file user ke liye note create aur edit karna ke liye hai matlab -->


{% extends 'base.html' %}
{% block content %}

<h2 style="margin-bottom: 20px;">
    {% if action == 'Create' %}
      Create New Note
    {% else %}
        Edit Note
    {% endif %}
</h2>

<div style="background: white; padding: 30px; border-radius: 10px; max-width: 600px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
    <form method="post">
        {% csrf_token %}

        <!-- title field -->
        <label><strong>Title:</strong></label>
        <input type="text" name="title" value="{{ form.title.value|default:'' }}"
               placeholder="Enter note title..." maxlength="200"
               style="width:100%; padding:10px; margin:8px 0 16px; border:1px solid #ccc; border-radius:5px;">

        <!-- content field with character counter -->
        <label><strong>Content:</strong></label>
        <textarea name="content" id="content-field" rows="5"
                  placeholder="Enter note content..."
                  style="width:100%; padding:10px; margin:8px 0 5px; border:1px solid #ccc; border-radius:5px; font-size:14px;">{{ form.content.value|default:'' }}</textarea>

        <!-- character counter — JavaScript se update hoga -->
        <p id="char-counter" style="text-align:right; font-size:12px; color:#888; margin-bottom:16px;">
            0 characters
        </p>

        <!-- color picker -->
        <label><strong>Color:</strong></label>
        <input type="color" name="color"
               value="{{ form.color.value|default:'#FFFF99' }}"
               style="width:100%; height:45px; padding:2px; margin:8px 0 16px; border:1px solid #ccc; border-radius:5px; cursor:pointer;">

        <!-- pin checkbox -->
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:20px; cursor:pointer;">
            <input type="checkbox" name="is_pinned"
                   {% if form.is_pinned.value %}checked{% endif %}
                   style="width:20px; height:20px;">
            <strong>📌 Pin this note to the top</strong>
        </label>

        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
            Save Note
        </button>
        <a href="{% url 'note_list' %}" class="btn btn-secondary" style="margin-top: 10px;">
            Cancel
        </a>
    </form>
</div>

<!-- character counter JavaScript -->
<script>
    // content field mein type karne par character count update karo
    const contentField = document.getElementById('content-field');
    const charCounter = document.getElementById('char-counter');

    function updateCounter() {
        const count = contentField.value.length;
        charCounter.textContent = count + ' characters';
        // 500 se zyada hone par red kar do
        charCounter.style.color = count > 500 ? '#f44336' : '#888';
    }

    // page load par bhi count dikhao (edit mode ke liye)
    updateCounter();
    contentField.addEventListener('input', updateCounter);
</script>

{% endblock %}
